<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0b1220" />
  <title>{% block title %}Market Sentiment Engine{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-0: #050816;
      --bg-1: #0b1220;
      --bg-2: #101a33;
      --panel: rgba(15, 23, 42, 0.82);
      --panel-strong: rgba(17, 24, 39, 0.96);
      --text: #e5eefc;
      --muted: #9fb0d0;
      --border: rgba(148, 163, 184, 0.18);
      --green: #34d399;
      --red: #fb7185;
      --amber: #fbbf24;
      --blue: #60a5fa;
      --shadow: 0 24px 80px rgba(2, 6, 23, 0.45);
      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 16px;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(96, 165, 250, 0.18), transparent 24%),
        radial-gradient(circle at 80% 0%, rgba(52, 211, 153, 0.12), transparent 24%),
        radial-gradient(circle at 100% 65%, rgba(251, 191, 36, 0.08), transparent 22%),
        linear-gradient(160deg, var(--bg-0), var(--bg-1) 46%, var(--bg-2));
    }
    a { color: #93c5fd; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .shell {
      width: min(1280px, calc(100% - 28px));
      margin: 0 auto;
      padding: 28px 0 56px;
    }
    .masthead {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 18px;
    }
    .brand { display: grid; gap: 6px; }
    .brand h1 { margin: 0; font-size: 1.1rem; letter-spacing: -0.03em; font-weight: 800; }
    .brand p { margin: 0; color: var(--muted); font-size: 0.94rem; }
    .badge-row { display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 10px; }
    .badge {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 9px 13px; border-radius: 999px;
      background: rgba(255, 255, 255, 0.04); border: 1px solid var(--border);
      color: var(--muted); font-size: 0.92rem;
    }
    .card {
      background: linear-gradient(180deg, rgba(15, 23, 42, 0.88), rgba(15, 23, 42, 0.74));
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      padding: 22px;
    }
    .card + .card { margin-top: 18px; }
    .hero {
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at top right, rgba(96, 165, 250, 0.2), transparent 34%),
        radial-gradient(circle at bottom left, rgba(52, 211, 153, 0.14), transparent 28%),
        linear-gradient(135deg, rgba(15, 23, 42, 0.98), rgba(30, 41, 59, 0.94));
    }
    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 18%, rgba(255,255,255,0.06) 48%, transparent 82%);
      pointer-events: none;
    }
    .hero-grid { position: relative; display: grid; gap: 18px; }
    .hero-top {
      display: flex; justify-content: space-between; align-items: start;
      gap: 18px; flex-wrap: wrap;
    }
    .hero-title {
      margin: 0;
      font-size: clamp(2rem, 5vw, 4.1rem);
      line-height: 0.96;
      letter-spacing: -0.06em;
    }
    .hero-subtitle {
      margin: 12px 0 0;
      max-width: 72ch;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.65;
    }
    .actions { display: flex; flex-wrap: wrap; gap: 10px; }
    .btn {
      appearance: none; border: 1px solid transparent;
      border-radius: 14px; padding: 11px 15px;
      font: inherit; font-weight: 700;
      cursor: pointer; color: white;
      background: linear-gradient(135deg, #2563eb, #14b8a6);
      box-shadow: 0 12px 28px rgba(37, 99, 235, 0.16);
    }
    .btn.secondary { color: var(--text); background: rgba(255,255,255,0.05); border-color: var(--border); box-shadow: none; }
    .btn.ghost { color: var(--text); background: transparent; border-color: var(--border); box-shadow: none; }
    .btn:disabled { opacity: 0.65; cursor: progress; }
    .grid { display: grid; gap: 18px; }
    .grid.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid.three { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .grid.four { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .section-title { margin: 0 0 12px; font-size: 1rem; letter-spacing: -0.02em; }
    .muted { color: var(--muted); }
    .field-row {
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      gap: 10px;
      align-items: center;
    }
    .field {
      width: 100%; min-height: 46px;
      border-radius: 14px; border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      padding: 0 14px; font: inherit; outline: none;
    }
    .field::placeholder { color: #6b7da5; }
    .field:focus { border-color: rgba(96, 165, 250, 0.6); box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.12); }
    .stat {
      background: rgba(2, 6, 23, 0.4);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 18px;
    }
    .stat .label {
      color: var(--muted);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
    }
    .stat .value {
      margin-top: 10px;
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1;
    }
    .small { font-size: 0.92rem; color: var(--muted); }
    .pill-row { display: flex; flex-wrap: wrap; gap: 10px; }
    .pill {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 9px 12px; border-radius: 999px;
      background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      color: var(--text);
    }
    .pill.active { border-color: rgba(96,165,250,0.48); background: rgba(96,165,250,0.14); }
    .table-wrap {
      overflow: auto;
      border-radius: 18px;
      border: 1px solid var(--border);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
      background: rgba(3, 7, 18, 0.18);
    }
    th, td {
      padding: 14px 12px;
      text-align: left;
      border-bottom: 1px solid rgba(148,163,184,0.12);
      vertical-align: top;
    }
    th {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
    }
    .trend-up { color: var(--green); }
    .trend-down { color: var(--red); }
    .trend-flat { color: var(--amber); }
    .chip {
      display: inline-flex; align-items: center; gap: 8px;
      border-radius: 999px; padding: 6px 10px;
      font-size: 0.84rem; border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
    }
    .footer-note {
      margin-top: 18px;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.6;
    }
    @media (max-width: 1024px) {
      .grid.four, .grid.three, .grid.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .field-row { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 720px) {
      .shell { width: min(100% - 20px, 100%); }
      .masthead { flex-direction: column; align-items: stretch; }
      .badge-row { justify-content: flex-start; }
      .grid.four, .grid.three, .grid.two { grid-template-columns: 1fr; }
      .field-row { grid-template-columns: 1fr; }
    }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>
  <div class="shell">
    <header class="masthead">
      <div class="brand">
        <h1>Market Sentiment Engine</h1>
        <p>Standalone dashboard for live public-news sentiment analysis</p>
      </div>
      <div class="badge-row">
        <span class="badge">Flask API</span>
        <span class="badge">SQLite persistence</span>
        <span class="badge">RSS ingestion</span>
        <span class="badge">Lexicon scoring</span>
      </div>
    </header>
    {% block content %}{% endblock %}
  </div>
</body>
</html>
